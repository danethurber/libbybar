name: ci

on:
  # No standalone `push` trigger: on pushes to main, release.yml calls this via
  # workflow_call, so a push trigger here would just double every macOS build.
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    # arm64 runner — the app targets Apple Silicon only. Pinned (not
    # macos-latest) so the release artifact's toolchain doesn't drift.
    runs-on: macos-15
    env:
      # Never attempt code signing on CI (unsigned personal/community build).
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      # setup-node's npm cache only covers ~/.npm; Electron's ~100MB binary and
      # electron-builder's helpers download separately. Cache them explicitly.
      - name: Cache Electron binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - run: npm test
      # Validate the full packaging path on PRs only. On workflow_call (push to
      # main) semantic-release builds the release DMG, so skip the duplicate.
      - name: Package .dmg (PR validation)
        if: github.event_name == 'pull_request'
        run: npx electron-builder --publish never
      - name: Upload .dmg artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dmg
          path: release/*.dmg
          retention-days: 7
