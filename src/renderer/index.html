<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' https: data:; style-src 'self'"
  />
  <title>LibbyBar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Read-only now-playing strip. The Libby site is a sibling WebContentsView
       that the main process positions below this strip — it is not in this DOM.
       Playback controls live in the Libby view; this strip only displays what
       navigator.mediaSession reports. -->
  <main id="strip">
    <div id="empty-state">Nothing playing — open a book below</div>

    <div id="now-playing" hidden>
      <img id="artwork" alt="" draggable="false" />
      <div class="titles">
        <div id="title"></div>
        <div id="subtitle"></div>
      </div>
      <div id="state-dot" title="Playing"></div>
    </div>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
